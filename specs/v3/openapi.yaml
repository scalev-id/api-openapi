      description: Retrieves a paginated list of bundles with optional filtering. The
        data is sorted by id in descending order and cannot be changed. Uses
        cursor-based pagination with default page size of 25 and maximum of 25.
      parameters:
        - description: "Number of items per page (default: 25, max: 25)"
          in: query
          name: page_size
          required: false
          schema:
            example: 25
            maximum: 25
            type: integer
        - description: Last order ID for cursor-based pagination
          in: query
          name: last_id
          required: false
          schema:
            type: integer
        - description: Search term to filter bundles by name (case-insensitive, partial
            match)
          in: query
          name: search
          required: false
          schema:
            type: string
        - description: Filter bundles by their sharing status
          in: query
          name: is_bundle_sharing
          required: false
          schema:
            type: boolean
        - description: Filter bundles that have price options available in the specified
            store ID
          in: query
          name: store_id
          required: false
          schema:
            type: integer
        - description: Filter bundles that are associated with the specified label
          in: query
          name: label
          required: false
          schema:
            type: string
