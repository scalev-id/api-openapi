          type: integer
          minimum: 1
          default: 1
      additionalProperties: true
    CartItemUpdateRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          minimum: 1
      additionalProperties: true
    PasswordRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
      additionalProperties: true
    ForgetPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
      additionalProperties: true
    SavePasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
        password:
          type: string
      additionalProperties: true
    CustomerOtpSendRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        login_as:
          type: string
          enum: [customer, owner]
      additionalProperties: true
    CustomerOtpVerifyRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
        login_as:
          type: string
          enum: [customer, owner]
      additionalProperties: true
    JwtRefreshRequest:
      type: object
      required:
        - refresh
      properties:
        refresh:
          type: string
      additionalProperties: true
    JwtBlacklistRequest:
      type: object
      required:
        - tokens
      properties:
        tokens:
          type: array
          items:
            type: string
      additionalProperties: true
    SubscriptionVariantChangeRequest:
      type: object
      required:
        - variant_id
      properties:
        variant_id:
          oneOf:
            - type: integer
            - type: string
      additionalProperties: true
