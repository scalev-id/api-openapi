        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /v3/customers/jwt/refresh:
    post:
      tags: [Customer Auth]
      operationId: refreshCustomerJwt
      summary: Refresh a customer JWT
      parameters:
        - $ref: "#/components/parameters/RequiredOriginHeader"
      requestBody:
        $ref: "#/components/requestBodies/JwtRefreshRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /v3/customers/jwt/blacklist:
    post:
      tags: [Customer Auth]
      operationId: blacklistCustomerJwt
