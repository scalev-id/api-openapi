openapi: 3.0.3
info:
  title: Nexus Commerce API
  version: 3.0.0
  description: >
    Public v3 commerce contract for storefront, customer, and authenticated
    business

    commerce flows.


    This specification intentionally documents only the `/v3` namespace.

    Store-derived public storefront routes under
    `/v3/stores/{store_id}/public/*`

    require the `X-Scalev-Storefront-Api-Key` header.
  license:
    name: Proprietary
servers:
  - url: https://api.myscalev.com
    description: Production
security: []
tags:
  - name: Orders
    description: Authenticated business order management endpoints.
  - name: Storefront
    description: Public storefront catalog, guest cart, and guest checkout flows.
      All store-derived public storefront routes require
      `X-Scalev-Storefront-Api-Key`.
  - name: Public Orders
    description: Public order lookup and payment endpoints.
  - name: Customer Auth
    description: Public customer authentication and password-reset endpoints.
  - name: Customer Account
    description: Authenticated customer profile endpoints.
  - name: Customer Cart
    description: Authenticated customer cart management endpoints.
  - name: Customer Checkout
    description: Authenticated customer checkout preparation and confirmation endpoints.
  - name: Customer Orders
    description: Authenticated customer order read endpoints.
  - name: Customer Subscriptions
    description: Authenticated customer subscription and subscription-item endpoints.
  - name: Customer Courses
    description: Authenticated customer digital course access and progress endpoints.
  - name: Discounts
    description: Discount-code validation endpoints.
  - name: Locations
    description: Authenticated business location lookup endpoints.
  - name: Shipping
    description: Public and authenticated shipping lookup endpoints.
  - name: Business Products
    description: Authenticated business product, variant, taxonomy, and course
      management endpoints.
  - name: Business Bundles
    description: Authenticated business bundle, bundle-price-option, and related
      bundle-management endpoints.
  - name: Business Customers
    description: Authenticated business customer and customer-address management endpoints.
  - name: WABA
    description: Authenticated WhatsApp Business Account operations and related WABA
      resources.
  - name: WhatsApp Integrations
    description: Authenticated WhatsApp integration management endpoints.
paths:
  /v3/stores/{store_id}/public/products:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    get:
      tags:
        - Storefront
      operationId: listStorefrontProducts
      summary: List storefront products
      responses:
        "200":
          $ref: "#/components/responses/PaginatedCollectionResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/products/count:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    get:
      tags:
        - Storefront
      operationId: countStorefrontProducts
      summary: Count storefront products
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/products/{slug}:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
      - $ref: "#/components/parameters/ProductSlug"
    get:
      tags:
        - Storefront
      operationId: getStorefrontProduct
      summary: Get a storefront product by slug
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/categories:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    get:
      tags:
        - Storefront
      operationId: listStorefrontCategories
      summary: List storefront categories
      responses:
        "200":
          $ref: "#/components/responses/CollectionResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/variants/pricing:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
      - $ref: "#/components/parameters/VariantIds"
    get:
      tags:
        - Storefront
      operationId: getStorefrontVariantPricing
      summary: Get storefront variant pricing
      responses:
        "200":
          $ref: "#/components/responses/CollectionResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/cart:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    get:
      tags:
        - Storefront
      operationId: getGuestCart
      summary: Get the guest storefront cart
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/cart/items:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    post:
      tags:
        - Storefront
      operationId: addGuestCartItem
      summary: Add an item to the guest storefront cart
      requestBody:
        $ref: "#/components/requestBodies/CartItemRequestBody"
      responses:
        "201":
          $ref: "#/components/responses/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/cart/items/{item_id}:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
      - $ref: "#/components/parameters/ItemId"
    patch:
      tags:
        - Storefront
      operationId: updateGuestCartItem
      summary: Update a guest storefront cart item
      requestBody:
        $ref: "#/components/requestBodies/CartItemUpdateRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
    delete:
      tags:
        - Storefront
      operationId: removeGuestCartItem
      summary: Remove a guest storefront cart item
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/cart/merge:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    post:
      tags:
        - Storefront
      operationId: mergeGuestCart
      summary: Merge a guest cart into the authenticated customer cart
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/guest-checkout:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    post:
      tags:
        - Storefront
      operationId: createGuestCheckout
      summary: Checkout a storefront cart as a guest
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "201":
          $ref: "#/components/responses/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/orders/search-courier-service:
    post:
      tags:
        - Shipping
      operationId: searchPublicCourierServices
      summary: Search courier services for public checkout
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/CollectionResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /v3/orders/public/{secret_slug}:
    parameters:
      - $ref: "#/components/parameters/SecretSlug"
    get:
      tags:
        - Public Orders
      operationId: getPublicOrder
      summary: Get a public order by secret slug
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/orders/public/{secret_slug}/payment:
    parameters:
      - $ref: "#/components/parameters/SecretSlug"
    post:
      tags:
        - Public Orders
      operationId: createPublicOrderPayment
      summary: Create a payment for a public order
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/public/discount-codes/check:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/StorefrontPublicApiKey"
    get:
      tags:
        - Discounts
      operationId: checkDiscountCode
      summary: Check discount code validity
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /v3/stores/{store_id}/public/auth/otp/send:
    post:
      tags:
        - Customer Auth
      operationId: sendCustomerOtp
      summary: Send a customer login OTP or return direct login tokens
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/StorefrontPublicApiKey"
      requestBody:
        $ref: "#/components/requestBodies/CustomerOtpSendRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "204":
          $ref: "#/components/responses/NoContentResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/public/auth/otp/verify:
    post:
      tags:
        - Customer Auth
      operationId: verifyCustomerOtp
      summary: Verify a customer login OTP
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/StorefrontPublicApiKey"
      requestBody:
        $ref: "#/components/requestBodies/CustomerOtpVerifyRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/public/auth/jwt/refresh:
    post:
      tags:
        - Customer Auth
      operationId: refreshCustomerJwt
      summary: Refresh a customer JWT
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/StorefrontPublicApiKey"
      requestBody:
        $ref: "#/components/requestBodies/JwtRefreshRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/public/auth/jwt/blacklist:
    post:
      tags:
        - Customer Auth
      operationId: blacklistCustomerJwt
      summary: Blacklist customer JWTs
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/StorefrontPublicApiKey"
      requestBody:
        $ref: "#/components/requestBodies/JwtBlacklistRequestBody"
      responses:
        "204":
          $ref: "#/components/responses/NoContentResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /v3/stores/{store_id}/public/auth/forget-password:
    post:
      tags:
        - Customer Auth
      operationId: startCustomerPasswordReset
      summary: Start a customer password reset flow
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/StorefrontPublicApiKey"
      requestBody:
        $ref: "#/components/requestBodies/ForgetPasswordRequestBody"
      responses:
        "204":
          $ref: "#/components/responses/NoContentResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /v3/stores/{store_id}/public/auth/save-password:
    post:
      tags:
        - Customer Auth
      operationId: saveCustomerPassword
      summary: Save a new customer password from a reset token
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/StorefrontPublicApiKey"
      requestBody:
        $ref: "#/components/requestBodies/SavePasswordRequestBody"
      responses:
        "204":
          $ref: "#/components/responses/NoContentResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/customers/me:
    get:
      tags:
        - Customer Account
      operationId: getCustomerMe
      summary: Get the authenticated customer profile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/set-new-password:
    post:
      tags:
        - Customer Account
      operationId: setCustomerPassword
      summary: Set a new password for the authenticated customer
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      requestBody:
        $ref: "#/components/requestBodies/PasswordRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/cart:
    get:
      tags:
        - Customer Cart
      operationId: getCustomerCart
      summary: Get the authenticated customer cart
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/cart/items:
    post:
      tags:
        - Customer Cart
      operationId: addCustomerCartItem
      summary: Add an item to the authenticated customer cart
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      requestBody:
        $ref: "#/components/requestBodies/CartItemRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/cart/items/{item_id}:
    parameters:
      - $ref: "#/components/parameters/ItemId"
      - $ref: "#/components/parameters/StoreId"
    patch:
      tags:
        - Customer Cart
      operationId: updateCustomerCartItem
      summary: Update an authenticated customer cart item
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/CartItemUpdateRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
    delete:
      tags:
        - Customer Cart
      operationId: removeCustomerCartItem
      summary: Remove an authenticated customer cart item
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/cart/checkout:
    post:
      tags:
        - Customer Cart
      operationId: checkoutCustomerCart
      summary: Checkout the authenticated customer cart
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "201":
          $ref: "#/components/responses/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/checkout/addresses:
    get:
      tags:
        - Customer Checkout
      operationId: listCheckoutAddresses
      summary: List saved checkout addresses
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          $ref: "#/components/responses/CollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/checkout/payment-methods:
    get:
      tags:
        - Customer Checkout
      operationId: listCheckoutPaymentMethods
      summary: List available checkout payment methods
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/checkout/shipping-options:
    post:
      tags:
        - Customer Checkout
      operationId: listCheckoutShippingOptions
      summary: Get checkout shipping options
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/CollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/checkout/summary:
    post:
      tags:
        - Customer Checkout
      operationId: getCheckoutSummary
      summary: Compute checkout summary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/checkout/confirm:
    post:
      tags:
        - Customer Checkout
      operationId: confirmCheckout
      summary: Confirm checkout
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "201":
          $ref: "#/components/responses/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/orders:
    get:
      tags:
        - Customer Orders
      operationId: listCustomerOrders
      summary: List authenticated customer orders
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          $ref: "#/components/responses/PaginatedCollectionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
  /v3/stores/{store_id}/customers/me/orders/{id}:
    parameters:
      - $ref: "#/components/parameters/OrderId"
      - $ref: "#/components/parameters/StoreId"
    get:
      tags:
        - Customer Orders
      operationId: getCustomerOrder
      summary: Get an authenticated customer order
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
  /v3/stores/{store_id}/customers/me/subscriptions:
    parameters:
      - $ref: "#/components/parameters/StoreId"
    get:
      tags:
        - Customer Subscriptions
      operationId: listCustomerSubscriptions
      summary: List authenticated customer subscriptions
      security:
        - bearerAuth: []
      parameters:
        - description: "Number of items per page (default: 25, max: 25)"
          in: query
          name: page_size
          required: false
          schema:
            example: 25
            maximum: 25
            type: integer
        - description: Last subscription UUID for cursor-based pagination
          in: query
          name: last_id
          required: false
          schema:
            format: uuid
            type: string
        - description: Filter by subscription status (unactivated, active, canceled,
            expired)
          in: query
          name: status
          required: false
          schema:
            enum:
              - unactivated
              - active
              - canceled
              - expired
              - failed
            type: string
      responses:
        "200":
          $ref: "#/components/responses/ListCustomerSubscriptionsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
      description: Retrieves a paginated list of subscriptions. The data is sorted by
        id in descending order. Uses cursor-based pagination with default page
        size of 25 and maximum of 25.
  /v3/stores/{store_id}/customers/me/subscriptions/{id}:
    parameters:
      - $ref: "#/components/parameters/SubscriptionId"
      - $ref: "#/components/parameters/StoreId"
    get:
      tags:
        - Customer Subscriptions
      operationId: getCustomerSubscription
      summary: Get an authenticated customer subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/GetCustomerSubscriptionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      description: Retrieves detailed information about a specific subscription
        identified by its ID.
  /v3/stores/{store_id}/customers/me/subscriptions/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/SubscriptionId"
      - $ref: "#/components/parameters/StoreId"
    post:
      tags:
        - Customer Subscriptions
      operationId: cancelCustomerSubscription
      summary: Cancel a customer subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/CancelCustomerSubscriptionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      description: >
        Cancels a subscription at period end. The subscription must be active
        and not already marked for cancellation.

        All active subscription items will be marked for cancellation as well.

        Any pending/scheduled actions will be canceled.
  /v3/stores/{store_id}/customers/me/subscriptions/{id}/resume:
    parameters:
      - $ref: "#/components/parameters/SubscriptionId"
      - $ref: "#/components/parameters/StoreId"
    post:
      tags:
        - Customer Subscriptions
      operationId: resumeCustomerSubscription
      summary: Resume a customer subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ResumeCustomerSubscriptionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      description: >
        Resumes a subscription that was scheduled for cancellation at period
        end.

        The subscription must be active and have is_cancel_at_period_end = true.

        All subscription items scheduled for cancellation will also be resumed.

        If the subscription is approaching renewal, a new renewal action will be
        created.
  /v3/stores/{store_id}/customers/me/subscription-items/{id}/upgrade:
    parameters:
      - $ref: "#/components/parameters/SubscriptionItemId"
      - $ref: "#/components/parameters/StoreId"
    get:
      tags:
        - Customer Subscriptions
      operationId: listSubscriptionUpgradeOptions
      summary: List subscription upgrade options
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ListSubscriptionUpgradeOptionsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      description: >
        Retrieves a list of variants with higher prices than the current variant
        of the subscription item.

        Only active subscription items that are not scheduled for cancellation
        are eligible.
    post:
      tags:
        - Customer Subscriptions
      operationId: upgradeSubscriptionItem
      summary: Upgrade a subscription item
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/UpgradeSubscriptionItemRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/UpgradeSubscriptionItemResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      description: >
        Upgrades a subscription item to a higher-priced variant.

        Creates a subscription action with type 'upgrade' and executes it within
        the same transaction.

        The variant_id must be present in the list of upgrade variants.
  /v3/stores/{store_id}/customers/me/subscription-items/{id}/downgrade:
