openapi: 3.0.3
info:
  title: Nexus Commerce API
  version: 3.0.0
  description: |
    Public v3 commerce contract for storefront, customer, and authenticated business
    commerce flows.

    This specification intentionally documents only the `/v3` namespace.
  license:
    name: Proprietary
servers:
  - url: https://api.myscalev.com
    description: Production
security: []
tags:
  - name: Storefront
    description: Public storefront catalog, guest cart, and guest checkout flows.
  - name: Public Orders
    description: Public order lookup and payment endpoints.
  - name: Customer Auth
    description: Public customer authentication and password-reset endpoints.
  - name: Customer Account
    description: Authenticated customer profile endpoints.
  - name: Customer Cart
    description: Authenticated customer cart management endpoints.
  - name: Customer Checkout
    description: Authenticated customer checkout preparation and confirmation endpoints.
  - name: Customer Orders
    description: Authenticated customer order read endpoints.
  - name: Customer Subscriptions
    description: Authenticated customer subscription and subscription-item endpoints.
  - name: Customer Courses
    description: Authenticated customer digital course access and progress endpoints.
  - name: Discounts
    description: Discount-code validation endpoints.
  - name: Locations
    description: Authenticated business location lookup endpoints.
  - name: Shipping
    description: Public and authenticated shipping lookup endpoints.
  - name: Business Orders
    description: Authenticated business order management endpoints.
paths:
  /v3/stores/{store_id}/storefront/products:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/OriginHeader"
    get:
      tags: [Storefront]
      operationId: listStorefrontProducts
      summary: List storefront products
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/products/count:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/OriginHeader"
    get:
      tags: [Storefront]
      operationId: countStorefrontProducts
      summary: Count storefront products
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/products/{slug}:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/ProductSlug"
      - $ref: "#/components/parameters/OriginHeader"
    get:
      tags: [Storefront]
      operationId: getStorefrontProduct
      summary: Get a storefront product by slug
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/categories:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/OriginHeader"
    get:
      tags: [Storefront]
      operationId: listStorefrontCategories
      summary: List storefront categories
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/variants/pricing:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/VariantIds"
      - $ref: "#/components/parameters/OriginHeader"
    get:
      tags: [Storefront]
      operationId: getStorefrontVariantPricing
      summary: Get storefront variant pricing
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/cart:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/OriginHeader"
    get:
      tags: [Storefront]
      operationId: getGuestCart
      summary: Get the guest storefront cart
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/cart/items:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/OriginHeader"
    post:
      tags: [Storefront]
      operationId: addGuestCartItem
      summary: Add an item to the guest storefront cart
      requestBody:
        $ref: "#/components/requestBodies/CartItemRequestBody"
      responses:
        "201":
          $ref: "#/components/responses/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/cart/items/{item_id}:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/ItemId"
      - $ref: "#/components/parameters/OriginHeader"
    patch:
      tags: [Storefront]
      operationId: updateGuestCartItem
      summary: Update a guest storefront cart item
      requestBody:
        $ref: "#/components/requestBodies/CartItemUpdateRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
    delete:
      tags: [Storefront]
      operationId: removeGuestCartItem
      summary: Remove a guest storefront cart item
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/cart/merge:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/RequiredOriginHeader"
    post:
      tags: [Storefront]
      operationId: mergeGuestCart
      summary: Merge a guest cart into the authenticated customer cart
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/stores/{store_id}/storefront/guest-checkout:
    parameters:
      - $ref: "#/components/parameters/StoreId"
      - $ref: "#/components/parameters/OriginHeader"
    post:
      tags: [Storefront]
      operationId: createGuestCheckout
      summary: Checkout a storefront cart as a guest
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "201":
          $ref: "#/components/responses/CreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/orders/search-courier-service:
    post:
      tags: [Shipping]
      operationId: searchPublicCourierServices
      summary: Search courier services for public checkout
      parameters:
        - $ref: "#/components/parameters/OriginHeader"
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"

  /v3/orders/public/{secret_slug}:
    parameters:
      - $ref: "#/components/parameters/SecretSlug"
      - $ref: "#/components/parameters/OriginHeader"
    get:
      tags: [Public Orders]
      operationId: getPublicOrder
      summary: Get a public order by secret slug
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/orders/public/{secret_slug}/payment:
    parameters:
      - $ref: "#/components/parameters/SecretSlug"
      - $ref: "#/components/parameters/OriginHeader"
    post:
      tags: [Public Orders]
      operationId: createPublicOrderPayment
      summary: Create a payment for a public order
      requestBody:
        $ref: "#/components/requestBodies/GenericJsonRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /v3/discount-codes/check:
    get:
      tags: [Discounts]
      operationId: checkDiscountCode
      summary: Check discount code validity
      parameters:
        - $ref: "#/components/parameters/OriginHeader"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"

  /v3/customers/auth/otp/send:
    post:
      tags: [Customer Auth]
      operationId: sendCustomerOtp
      summary: Send a customer login OTP
      parameters:
        - $ref: "#/components/parameters/RequiredOriginHeader"
      requestBody:
        $ref: "#/components/requestBodies/CustomerOtpSendRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /v3/customers/auth/otp/verify:
    post:
      tags: [Customer Auth]
      operationId: verifyCustomerOtp
      summary: Verify a customer login OTP
      parameters:
        - $ref: "#/components/parameters/RequiredOriginHeader"
      requestBody:
        $ref: "#/components/requestBodies/CustomerOtpVerifyRequestBody"
      responses:
