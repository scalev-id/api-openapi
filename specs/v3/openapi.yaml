components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: authorization
      description: "Send `Authorization: Bearer <api_key>` for machine-authenticated business requests."

  parameters:
    StoreId:
      name: store_id
      in: path
      required: true
      schema:
        type: string
      description: Store `unique_id`.
    StorefrontPublicApiKey:
      name: X-Scalev-Storefront-Api-Key
      in: header
      required: true
      schema:
        type: string
      description: Publishable storefront public API key for the target store.
    ProductSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
    SecretSlug:
      name: secret_slug
      in: path
      required: true
      schema:
        type: string
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
    SubscriptionId:
      name: id
      in: path
      required: true
      schema:
        type: string
    SubscriptionItemId:
      name: id
