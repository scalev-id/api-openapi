      name: authorization
      description: "Send `Authorization: Bearer <api_key>` for machine-authenticated business requests."

  parameters:
    OriginHeader:
      name: x-origin
      in: header
      required: false
      description: Store origin or custom domain used to resolve storefront context.
      schema:
        type: string
    RequiredOriginHeader:
      name: x-origin
      in: header
      required: true
      description: Store origin or custom domain used to resolve customer context.
      schema:
        type: string
    StoreId:
      name: store_id
      in: path
      required: true
      schema:
        type: string
      description: Store `unique_id`.
    ProductSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
    SecretSlug:
      name: secret_slug
      in: path
      required: true
      schema:
        type: string
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
    SubscriptionId:
      name: id
      in: path
      required: true
      schema:
        type: string
    SubscriptionItemId:
      name: id
      in: path
      required: true
      schema:
        type: string
    ItemId:
      name: item_id
      in: path
      required: true
      schema:
        type: string
    ChatId:
      name: chat_id
      in: path
      required: true
      schema:
        type: string
    Uuid:
      name: uuid
      in: path
      required: true
      schema:
        type: string
    PgReferenceId:
      name: pg_reference_id
      in: path
      required: true
      schema:
        type: string
    VariantIds:
      name: ids
      in: query
      required: false
      description: Comma-separated variant IDs.
      schema:
        type: string

  requestBodies:
    GenericJsonRequestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericJsonObject"
    GenericUploadRequestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/GenericUploadRequest"
    CartItemRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CartItemRequest"
    CartItemUpdateRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CartItemUpdateRequest"
    PasswordRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PasswordRequest"
    ForgetPasswordRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ForgetPasswordRequest"
    SavePasswordRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SavePasswordRequest"
    CustomerOtpSendRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CustomerOtpSendRequest"
    CustomerOtpVerifyRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CustomerOtpVerifyRequest"
    JwtRefreshRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JwtRefreshRequest"
    JwtBlacklistRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/JwtBlacklistRequest"
    SubscriptionVariantChangeRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubscriptionVariantChangeRequest"

  responses:
    SuccessResponse:
      description: Success
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiSuccessResponse"
    CreatedResponse:
      description: Created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiSuccessResponse"
    BadRequestResponse:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    UnauthorizedResponse:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ForbiddenResponse:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFoundResponse:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"

  schemas:
    FlexibleObject:
      type: object
      additionalProperties: true
    FlexibleValue:
      oneOf:
        - $ref: "#/components/schemas/FlexibleObject"
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
    ApiSuccessResponse:
      type: object
      required:
        - code
        - status
      properties:
        code:
          type: integer
          example: 200
        status:
          type: string
          example: Success
        data:
          $ref: "#/components/schemas/FlexibleValue"
        message:
          type: string
          nullable: true
    ApiErrorResponse:
      type: object
      required:
        - code
        - status
      properties:
        code:
          type: integer
          example: 400
        status:
          type: string
          example: Bad Request
        error:
          $ref: "#/components/schemas/FlexibleValue"
        message:
          type: string
          nullable: true
    GenericJsonObject:
      type: object
      additionalProperties: true
    GenericUploadRequest:
      type: object
      additionalProperties: true
      properties:
        file:
          type: string
          format: binary
    CartItemRequest:
      type: object
      required:
        - variant_id
      properties:
        variant_id:
          oneOf:
            - type: integer
            - type: string
        quantity:
          type: integer
          minimum: 1
          default: 1
      additionalProperties: true
    CartItemUpdateRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          minimum: 1
      additionalProperties: true
    PasswordRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
      additionalProperties: true
    ForgetPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
      additionalProperties: true
    SavePasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
        password:
          type: string
      additionalProperties: true
    CustomerOtpSendRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        login_as:
          type: string
          enum: [customer, owner]
      additionalProperties: true
    CustomerOtpVerifyRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
        login_as:
          type: string
          enum: [customer, owner]
      additionalProperties: true
    JwtRefreshRequest:
      type: object
      required:
        - refresh
      properties:
        refresh:
          type: string
      additionalProperties: true
    JwtBlacklistRequest:
      type: object
      required:
        - tokens
      properties:
        tokens:
          type: array
          items:
            type: string
      additionalProperties: true
    SubscriptionVariantChangeRequest:
      type: object
      required:
        - variant_id
      properties:
        variant_id:
          oneOf:
            - type: integer
            - type: string
      additionalProperties: true
