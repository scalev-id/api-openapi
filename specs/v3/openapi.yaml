  /v3/products:
    get:
      tags:
        - Business Products
      operationId: listProducts
      summary: List business products
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ListProductsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
      description: Retrieves a paginated list of products with optional filtering. The
        data is sorted by id in descending order and cannot be changed. Uses
        cursor-based pagination with default page size of 25 and maximum of 25.
      parameters:
        - description: "Number of items per page (default: 25, max: 25)"
          in: query
          name: page_size
          required: false
          schema:
            example: 25
            maximum: 25
            type: integer
        - description: Last order ID for cursor-based pagination
          in: query
          name: last_id
          required: false
          schema:
            type: integer
        - description: Search term to filter products by name (case-insensitive, partial
            match)
          in: query
          name: search
          required: false
          schema:
            type: string
        - description: Filter products by inventory tracking status (true or false)
          in: query
          name: is_inventory
          required: false
          schema:
            type: boolean
        - description: Filter products by product sharing status (true or false)
          in: query
          name: is_product_sharing
          required: false
          schema:
            type: boolean
        - description: Filter products associated with a specific warehouse ID
          in: query
          name: warehouse_id
          required: false
          schema:
            type: integer
        - description: Type of quantity to filter by. Options are 'available_qty' (only
            products with variants that have available quantity > 0)
          in: query
          name: qty_type
          required: false
          schema:
            enum:
              - available_qty
            type: string
        - description: Filter products associated with a specific store ID
          in: query
          name: store_id
          required: false
          schema:
            type: integer
        - description: Show variants in products where is_checked is true or false
          in: query
          name: is_checked
          required: false
          schema:
            type: boolean
        - description: Filter products by ownership. 'true' returns products owned by the
            business, 'false' returns shared products
          in: query
          name: is_owned
          required: false
          schema:
            type: boolean
        - description: Filter products by item type (physical, digital, course, license,
            subscription)
          in: query
          name: item_type
          required: false
          schema:
            description: Type of the product item
            enum:
              - physical
              - digital
              - course
              - license
              - subscription
            title: ItemType
            type: string
        - description: Filter products associated with a specific label name
          in: query
          name: label
          required: false
          schema:
            type: string
        - description: Filter products by pricing type (one_time or recurring)
          in: query
          name: pricing_type
          required: false
          schema:
            enum:
              - one_time
              - recurring
            type: string
    post:
      tags:
        - Business Products
      operationId: createProduct
      summary: Create a product
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
