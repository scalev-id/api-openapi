    Subscription:
      description: A subscription represents a recurring payment for a product or service.
      properties:
        activated_at:
          description: The date and time when the subscription was activated.
          format: date-time
          type: string
        business_customer_id:
          description: Identifier for the business customer associated with the
            subscription.
          format: uuid
          type: string
        business_id:
          description: Identifier for the business associated with the subscription.
          format: uuid
          type: string
        canceled_at:
          description: The date and time when the subscription was canceled.
          format: date-time
          type: string
        current_period_end:
          description: The end date of the current billing period.
          format: date-time
          type: string
        current_period_start:
          description: The start date of the current billing period.
          format: date-time
          type: string
        customer:
          description: Customer information
          properties:
            confirmed_at:
              description: Timestamp when the customer was confirmed
              format: date-time
              type: string
            created_at:
              description: Timestamp when the customer was created
              format: date-time
              type: string
            email:
              description: Customer email
              format: email
              type: string
            id:
              description: Customer ID
              type: integer
            last_updated_at:
              description: Timestamp when the customer was last updated
              format: date-time
              type: string
            name:
              description: Customer name
              type: string
            phone:
              description: Customer phone
              type: string
            status:
              description: Customer status
              type: string
          title: Customer
          type: object
        customer_id:
          description: Identifier for the customer associated with the subscription.
          format: uuid
          type: string
        expired_at:
          description: The date and time when the subscription expired.
          format: date-time
          type: string
        id:
          description: Unique identifier for the subscription.
          format: uuid
          type: string
        inserted_at:
          description: The date and time when the subscription was created.
          format: date-time
          type: string
        interval:
          description: Unit of the period
          enum:
            - day
            - week
            - month
            - year
          title: PeriodUnit
          type: string
        interval_count:
          description: The number of intervals between each billing cycle.
          type: integer
        is_active:
          description: Indicates if the subscription is currently active.
          type: boolean
        is_cancel_at_period_end:
          description: Indicates if the subscription will cancel at the end of the current
            period.
          type: boolean
        status:
          description: The status of the subscription.
          enum:
            - unactivated
            - active
            - canceled
            - expired
            - failed
          title: SubscriptionStatus
          type: string
        store:
          description: Store information
          properties:
            id:
              description: Store ID
              type: integer
            logo:
              description: Store logo URL
              type: string
            name:
              description: Store name
              type: string
            unique_id:
              description: Store unique identifier
              type: string
            uuid:
              description: Store UUID
              format: uuid
              type: string
          title: Store
          type: object
        store_id:
          description: Identifier for the store associated with the subscription.
          format: uuid
          type: string
        subscription_id:
          description: Human-readable subscription identifier (e.g. YYMMDD + random alpha).
          nullable: true
          type: string
        subscription_items:
          description: List of subscription items associated with the subscription.
          items:
            description: A simplified representation of a subscription item for listing
              purposes.
            properties:
              id:
                description: Unique identifier for the subscription item.
                format: uuid
                type: string
              quantity:
                description: The quantity of the item in the subscription.
                type: integer
              status:
                description: The status of a subscription item.
                enum:
                  - unactivated
                  - active
                  - pending_downgrade
                  - pending_upgrade
                  - canceled
                  - expired
                  - failed
                title: SubscriptionItemStatus
                type: string
              unit_price:
                description: The unit price of the item.
                format: decimal
                type: number
              variant:
                properties:
                  id:
                    description: Variant ID
                    type: integer
                  item_type:
                    description: Type of the product item
                    enum:
                      - physical
                      - digital
                      - course
                      - license
                      - subscription
                    title: ItemType
                    type: string
                  name:
                    description: Variant Name
                    type: string
                  product_name:
                    description: Product Name
                    type: string
                title: VariantRelation
                type: object
            title: SubscriptionItemListData
            type: object
          type: array
        updated_at:
          description: The date and time when the subscription was last updated.
          format: date-time
          type: string
      title: Subscription
      type: object
