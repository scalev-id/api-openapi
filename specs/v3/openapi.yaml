          $ref: "#/components/responses/SuccessResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /v3/customers/me/checkout/shipping-options:
    post:
      tags: [Customer Checkout]
      operationId: listCheckoutShippingOptions
