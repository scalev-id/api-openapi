info:
  title: Scalev API v2 (Nexus)
  version: 2.0.0
  license:
    name: Proprietary
openapi: 3.0.0
paths:
  /v2/bundles:
    post:
      callbacks: {}
      description: Creates a bundle for the authenticated business.
      operationId: ScalevApiWeb.BundleController.create
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BundleCreateRequest"
        description: Payload used to create a new bundle.
        required: false
      responses:
        "200":
          $ref: "#/components/responses/BundleResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      security:
        - bearerApiKey: []
        - oauth2:
            - bundle:create
      summary: Create a New Bundle
      tags:
        - Bundles
    get:
      callbacks: {}
      description: Retrieves a paginated list of bundles with optional filtering. The data is sorted by id in descending order and cannot be changed. Uses cursor-based pagination with default page size of 25 and maximum of 25.
      operationId: ScalevApiWeb.BundleController.index
      parameters:
        - $ref: "#/components/parameters/PageSizeQueryParameter"
        - $ref: "#/components/parameters/LastIDQueryParameter"
        - $ref: "#/components/parameters/SearchQueryParameter"
        - $ref: "#/components/parameters/IsBundleSharingQueryParameter"
        - $ref: "#/components/parameters/StoreIDQueryParameter"
        - $ref: "#/components/parameters/LabelQueryParameter"
      responses:
        "200":
          $ref: "#/components/responses/BundleListListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      security:
        - bearerApiKey: []
        - oauth2:
            - bundle:read
      summary: List Bundles
      tags:
        - Bundles
  /v2/bundles/count:
    get:
      callbacks: {}
      description: Retrieves the total count of bundles for the authenticated business. This endpoint does not support any filtering or pagination.
      operationId: ScalevApiWeb.BundleController.show_count
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  code:
                    example: 200
                    type: integer
                  data:
                    $ref: "#/components/schemas/BundleCount"
                  status:
                    example: Success
                    type: string
                type: object
          description: Bundles count
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
      security:
        - bearerApiKey: []
        - oauth2:
            - bundle:read
      summary: Count Bundles
      tags:
        - Bundles
  /v2/bundles/simplified:
    get:
      callbacks: {}
      description: Retrieves a paginated list of bundles with optional filtering. The data is sorted by id in descending order and cannot be changed. Uses cursor-based pagination with default page size of 25 and maximum of 25. This endpoint returns a simplified version of the bundle data, including only essential fields and active bundle price options.
      operationId: ScalevApiWeb.BundleController.index_simplified
      parameters:
        - $ref: "#/components/parameters/ForStoreIDQueryParameter"
        - $ref: "#/components/parameters/PageSizeQueryParameter"
        - $ref: "#/components/parameters/LastIDQueryParameter"
        - $ref: "#/components/parameters/SearchQueryParameter"
        - $ref: "#/components/parameters/IsBundleSharingQueryParameter"
        - $ref: "#/components/parameters/StoreIDQueryParameter"
        - $ref: "#/components/parameters/LabelQueryParameter"
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  code:
                    example: 200
                    type: integer
                  data:
                    properties:
                      has_next:
                        default: false
                        example: false
                        nullable: false
                        type: boolean
                      last_id:
                        example: 99
                        nullable: true
                        type: integer
                      page_size:
                        default: 25
                        example: 25
                        nullable: false
                        type: integer
                      results:
                        default: []
                        items:
                          $ref: "#/components/schemas/BundleListSimplified"
                        nullable: false
                        type: array
                    type: object
                  status:
                    example: Success
                    type: string
                type: object
          description: Bundles list (simplified)
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      security:
        - bearerApiKey: []
        - oauth2:
            - bundle:read
      summary: List Bundles (Simplified)
      tags:
        - Bundles
  /v2/bundles/{bundle_id}/bpos:
    post:
      callbacks: {}
      description: Creates a bundle price option for the authenticated business.
      operationId: ScalevApiWeb.BundleController.create_bpo
      parameters:
        - $ref: "#/components/parameters/BundleIDPathParameter"
      requestBody:
        $ref: "#/components/requestBodies/BundlePriceOptionRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/BundlePriceOptionResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      security:
        - bearerApiKey: []
        - oauth2:
            - bundle:create
      summary: Create a New Bundle Price Option for a Bundle
      tags:
        - Bundles
    get:
      callbacks: {}
      description: Retrieves a paginated list of bundle price options associated with a specific bundle. The data is sorted by id in descending order and cannot be changed. Uses cursor-based pagination with default page size of 25 and maximum of 25.
      operationId: ScalevApiWeb.BundleController.index_bpo
      parameters:
        - $ref: "#/components/parameters/BundleIDPathParameter"
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  code:
                    example: 200
                    type: integer
                  data:
                    properties:
                      has_next:
                        default: false
                        example: false
                        nullable: false
                        type: boolean
                      last_id:
                        example: 99
                        nullable: true
                        type: integer
                      page_size:
                        default: 25
                        example: 25
                        nullable: false
                        type: integer
                      results:
                        default: []
                        items:
                          $ref: "#/components/schemas/BundlePriceOption"
                        nullable: false
                        type: array
                    type: object
                  status:
                    example: Success
                    type: string
                type: object
          description: Bundle price options list
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      security:
        - bearerApiKey: []
        - oauth2:
            - bundle:read
      summary: List Bundle Price Options for a Bundle
      tags:
        - Bundles
  /v2/bundles/{bundle_id}/bpos/{id}:
    patch:
      callbacks: {}
      description: Updates the bundle price option for the authenticated business.
      operationId: ScalevApiWeb.BundleController.update_bpo
      parameters:
        - $ref: "#/components/parameters/BundleIDPathParameter"
        - $ref: "#/components/parameters/IDPathParameter"
      requestBody:
        $ref: "#/components/requestBodies/BundlePriceOptionRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/BundlePriceOptionResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      security:
        - bearerApiKey: []
        - oauth2:
            - bundle:update
      summary: Update a Bundle Price Option for a Bundle
      tags:
        - Bundles
    delete:
      callbacks: {}
      description: Deletes the bundle price option for the authenticated business.
      operationId: ScalevApiWeb.BundleController.delete_bpo
      parameters:
        - $ref: "#/components/parameters/BundleIDPathParameter"
        - $ref: "#/components/parameters/IDPathParameter"
      responses:
        "200":
          $ref: "#/components/responses/BlankSuccessApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
      security:
        - bearerApiKey: []
        - oauth2:
