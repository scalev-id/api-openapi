          schema:
            type: string
        - description: Filter results to a specific product ID.
          in: query
          name: product_id
          required: false
          schema:
            type: integer
        - description: Filter results to a specific variant ID.
          in: query
          name: variant_id
          required: false
          schema:
            type: integer
        - description: Maximum number of matches to return. Defaults to 10 and caps at 20.
          in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
        - $ref: "#/components/parameters/StoreIDPathParameter"
