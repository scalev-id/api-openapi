        "200":
          description: Matching product knowledge items.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: Success
                  data:
                    type: array
                    items:
                      title: ProductKnowledgeSearchResult
                      type: object
                      properties:
                        product_id:
                          type: integer
                          description: Associated product ID.
                        variant_id:
                          type: integer
                          nullable: true
                          description: Associated variant ID when the knowledge item is variant-specific.
                        q:
                          type: string
                          description: Knowledge item question text.
                        a:
                          type: string
                          description: Knowledge item answer text.
                        rank:
                          type: number
                          description: Full-text ranking score.
